{% extends 'core/base.html' %}

{% block content %}
<style>
    .todo-form {
        display: flex;
        gap: 12px;
        margin-bottom: 30px;
        position: relative;
    }
    .todo-input {
        flex: 1;
        padding: 14px 20px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        background: rgba(10, 10, 15, 0.5);
        color: var(--text-main);
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    .todo-input::placeholder {
        color: var(--text-muted);
    }
    .todo-input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.2), inset 0 0 5px rgba(0, 240, 255, 0.1);
        background: rgba(15, 15, 25, 0.8);
    }
    .todo-submit {
        background: transparent;
        color: var(--primary);
        padding: 0 24px;
        border-radius: 12px;
        border: 1px solid var(--primary);
        font-weight: 600;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.1), inset 0 0 10px rgba(0, 240, 255, 0.1);
        text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
    }
    .todo-submit:hover {
        background: var(--primary);
        color: #000;
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(0, 240, 255, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.5);
        text-shadow: none;
    }
    .todo-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }
    .todo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(20, 20, 30, 0.4);
        padding: 16px 20px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
        backdrop-filter: blur(5px);
    }
    .todo-item:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 15px rgba(255, 0, 255, 0.1);
        border-color: rgba(255, 0, 255, 0.3);
    }
    .todo-item.completed {
        opacity: 0.5;
        background: rgba(10, 10, 15, 0.3);
        border-color: rgba(255, 255, 255, 0.02);
        transform: none;
        box-shadow: none;
    }
    .todo-item.completed:hover {
        border-color: rgba(0, 240, 255, 0.2);
    }
    .todo-item.completed .todo-title {
        text-decoration: line-through;
        color: var(--text-muted);
    }
    .todo-content {
        display: flex;
        align-items: center;
        gap: 16px;
        flex: 1;
    }
    .todo-title {
        font-size: 1.05rem;
        font-weight: 300;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
    }
    .todo-actions {
        display: flex;
        gap: 10px;
    }
    .btn-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-muted);
        border: 1px solid transparent;
        transition: all 0.3s ease;
    }
    .btn-icon:hover {
        color: #fff;
    }
    .btn-complete {
        background: rgba(0, 240, 255, 0.05);
        color: rgba(0, 240, 255, 0.6);
    }
    .btn-complete:hover {
        background: rgba(0, 240, 255, 0.15);
        color: var(--primary);
        border-color: var(--primary);
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }
    .btn-delete {
        background: rgba(255, 0, 255, 0.05);
        color: rgba(255, 0, 255, 0.6);
    }
    .btn-delete:hover {
        background: rgba(255, 0, 255, 0.15);
        color: var(--accent);
        border-color: var(--accent);
        box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
    }
    .empty-state {
        text-align: center;
        padding: 50px 0;
        color: var(--text-muted);
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { opacity: 0.5; }
        50% { opacity: 1; text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        100% { opacity: 0.5; }
    }
</style>

<h1>My Tasks</h1>

<form class="todo-form" action="{% url 'todo_create' %}" method="POST">
    {% csrf_token %}
    <input type="text" name="title" class="todo-input" placeholder="What needs to be done?" required autocomplete="off">
    <button type="submit" class="todo-submit">Add</button>
</form>

<ul class="todo-list">
    {% for todo in todos %}
    <li class="todo-item {% if todo.completed %}completed{% endif %}">
        <div class="todo-content">
            <span class="todo-title">{{ todo.title }}</span>
        </div>
        <div class="todo-actions">
            <form action="{% url 'todo_complete' todo.id %}" method="POST" style="margin:0;">
                {% csrf_token %}
                <button type="submit" class="btn-icon btn-complete" title="Toggle Complete">
                    {% if todo.completed %}
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    {% else %}
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    {% endif %}
                </button>
            </form>
            <form action="{% url 'todo_delete' todo.id %}" method="POST" style="margin:0;">
                {% csrf_token %}
                <button type="submit" class="btn-icon btn-delete" title="Delete">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </form>
        </div>
    </li>
    {% empty %}
    <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:16px;opacity:0.5;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
        <p>No tasks yet. Add one above!</p>
    </div>
    {% endfor %}
</ul>
{% endblock %}
