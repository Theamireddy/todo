<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Todo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f0ff;
            --primary-hover: #00c3ff;
            --accent: #ff00ff;
            --bg-color: #05050a;
            --text-main: #e0e0ff;
            --text-muted: #6b6b80;
            --glass-bg: rgba(15, 15, 25, 0.6);
            --glass-border: rgba(0, 240, 255, 0.15);
            --glass-shadow: 0 0 30px rgba(0, 240, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #05050a 0%, #1a1a2e 50%, #0f0c29 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow), inset 0 0 20px rgba(0, 240, 255, 0.02);
            padding: 40px;
            overflow: hidden;
            position: relative;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .app-container:hover {
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1), inset 0 0 30px rgba(255, 0, 255, 0.03);
            border-color: rgba(255, 0, 255, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            background: -webkit-linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Generic styles that child templates might use */
        button {
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            border: none;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
